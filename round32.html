<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CTT - Polla Mundial 2026 | Round of 32</title>
  <style>
    :root {
      --navy: #10213f;
      --blue: #1d4ed8;
      --gold: #f4b400;
      --bg: #f3f6fb;
      --card: #ffffff;
      --muted: #64748b;
      --line: #d8e0ec;
      --success: #137a3a;
      --error: #b42318;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: radial-gradient(circle at top, #e9f0ff 0%, var(--bg) 42%, #eef2f7 100%);
      color: #142033;
    }
    .wrap { max-width: 1180px; margin: 0 auto; padding: 18px; }
    .hero {
      background: linear-gradient(135deg, #0b1f3f 0%, #123c7c 70%, #1d4ed8 100%);
      color: white;
      border-radius: 24px;
      padding: 24px 20px;
      box-shadow: 0 14px 35px rgba(16, 33, 63, .22);
      position: relative;
      overflow: hidden;
    }
    .hero:after {
      content: "⚽";
      position: absolute;
      right: 18px;
      top: 8px;
      font-size: 78px;
      opacity: .16;
      transform: rotate(-12deg);
    }
    h1 { margin: 0 0 6px; font-size: clamp(24px, 4vw, 40px); letter-spacing: -.5px; }
    .subtitle { margin: 0; color: #dbeafe; line-height: 1.35; font-size: 15px; max-width: 780px; }
    .panel {
      background: var(--card);
      border: 1px solid rgba(216, 224, 236, .9);
      border-radius: 20px;
      padding: 18px;
      margin-top: 16px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, .06);
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    label { display: block; font-weight: 750; margin-bottom: 6px; color: #243447; }
    input {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid #cfd8e6;
      border-radius: 13px;
      font-size: 16px;
      background: #fff;
      outline: none;
    }
    input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(29, 78, 216, .12); }
    .privacy { color: var(--muted); font-size: 13px; margin: 10px 0 0; }
    .progress-wrap { display: flex; gap: 10px; align-items: center; justify-content: space-between; flex-wrap: wrap; }
    .progress-text { font-weight: 800; color: var(--navy); }
    .bar { height: 10px; flex: 1; min-width: 170px; background: #e7edf7; border-radius: 999px; overflow: hidden; }
    .fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--blue), var(--gold)); border-radius: 999px; transition: width .25s ease; }
    .bracket {
      margin-top: 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      align-items: start;
    }
    .side-title {
      margin: 8px 0 12px;
      font-size: 18px;
      color: var(--navy);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .side { display: grid; gap: 14px; }
    .match {
      position: relative;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 8px 20px rgba(15, 23, 42, .055);
    }
    .match:before {
      content: "";
      position: absolute;
      left: -9px;
      top: 22px;
      bottom: 22px;
      width: 3px;
      background: linear-gradient(var(--blue), var(--gold));
      border-radius: 999px;
    }
    .match-head { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; margin-bottom: 10px; }
    .game-no { font-weight: 900; color: var(--navy); }
    .time { color: var(--muted); font-size: 13px; text-align: right; line-height: 1.25; }
    .teams { display: grid; gap: 8px; }
    .team-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 13px 12px;
      border: 1.5px solid #d3dcea;
      border-radius: 14px;
      background: #fff;
      color: #172033;
      cursor: pointer;
      font-size: 16px;
      text-align: left;
      transition: transform .08s ease, border-color .15s ease, background .15s ease, box-shadow .15s ease;
    }
    .team-btn:hover { border-color: #9db4d8; }
    .team-btn:active { transform: scale(.99); }
    .team-btn.selected {
      border-color: var(--blue);
      background: #eff6ff;
      box-shadow: 0 0 0 3px rgba(29, 78, 216, .10);
      font-weight: 900;
    }
    .team-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .flag { font-size: 24px; width: 30px; text-align: center; }
    .team-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .check { color: var(--blue); font-weight: 900; min-width: 22px; text-align: right; }
    .vs { text-align: center; color: var(--muted); font-weight: 800; font-size: 12px; letter-spacing: .08em; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-top: 16px; }
    button.action {
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 16px;
      font-weight: 850;
      cursor: pointer;
    }
    #submitBtn { background: var(--navy); color: white; flex: 1; min-width: 210px; }
    .secondary { background: #e8edf5; color: #213047; }
    .message { margin-top: 12px; font-weight: 850; }
    .message.success { color: var(--success); }
    .message.error { color: var(--error); }
    textarea {
      width: 100%;
      min-height: 180px;
      margin-top: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      border: 1px solid #d3dcea;
      border-radius: 14px;
      padding: 12px;
      color: #263344;
      background: #fbfdff;
    }
    @media (max-width: 850px) {
      .bracket, .form-grid { grid-template-columns: 1fr; }
      .hero { border-radius: 18px; padding: 22px 16px; }
      .wrap { padding: 12px; }
      .panel { border-radius: 16px; padding: 14px; }
      .match { border-radius: 16px; }
      .time { text-align: left; }
      .match-head { flex-direction: column; }
      .team-btn { padding: 14px 12px; }
      .actions { position: sticky; bottom: 0; background: rgba(243, 246, 251, .96); padding: 10px 0; backdrop-filter: blur(8px); }
      #submitBtn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>CTT - Polla Mundial 2026</h1>
      <p class="subtitle">Round of 32 · Selecciona el ganador de cada partido. Toca el equipo que crees que avanza. Las respuestas se guardan automáticamente en el Google Sheet privado del administrador.</p>
    </section>

    <section class="panel">
      <div class="form-grid">
        <div>
          <label for="participant">Nombre del participante</label>
          <input id="participant" placeholder="Ej. Natalia" autocomplete="name" required />
        </div>
        <div>
          <label for="participantEmail">Email del participante</label>
          <input id="participantEmail" type="email" placeholder="Ej. nombre@email.com" autocomplete="email" />
        </div>
      </div>
      <p class="privacy">Solo el administrador verá las respuestas consolidadas.</p>
    </section>

    <section class="panel progress-wrap">
      <div class="progress-text" id="progressText">Predicciones seleccionadas: 0 / 16</div>
      <div class="bar"><div class="fill" id="progressFill"></div></div>
    </section>

    <form id="predictionForm">
      <section class="bracket" id="bracket"></section>

      <section class="panel">
        <div class="actions">
          <button type="submit" class="action" id="submitBtn">Enviar predicción</button>
          <button type="button" class="action secondary" onclick="downloadCSV()">Descargar CSV de respaldo</button>
        </div>
        <div id="msg" class="message"></div>
        <textarea id="output" readonly placeholder="Aquí aparecerá tu resumen después de enviar o descargar respaldo."></textarea>
      </section>
    </form>
  </div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzwQRejWXRhBy3-L6vFcKRlpDnSN2bKfNpmWx6uwXuQyRfX3QAkA9q2GinKqhbZO9BY/exec";

const FLAGS = {
  RSA: '🇿🇦', CANADA: '🇨🇦', BRAZIL: '🇧🇷', JAPAN: '🇯🇵', GERMANY: '🇩🇪', PARAGUAY: '🇵🇾',
  NETHERLANDS: '🇳🇱', MOROCCO: '🇲🇦', CIV: '🇨🇮', NORWAY: '🇳🇴', FRANCE: '🇫🇷', SWEDEN: '🇸🇪',
  MEXICO: '🇲🇽', ECUADOR: '🇪🇨', ENGLAND: '🏴󠁧󠁢󠁥󠁮󠁧󠁿', CONGO: '🇨🇩', BELGIUM: '🇧🇪', SENEGAL: '🇸🇳',
  USA: '🇺🇸', 'BOSNIA-HERZEGOVINA': '🇧🇦', SPAIN: '🇪🇸', AUSTRIA: '🇦🇹', PORTUGAL: '🇵🇹',
  CROATIA: '🇭🇷', SWITZERLAND: '🇨🇭', ALGERIA: '🇩🇿', AUSTRALIA: '🇦🇺', EGYPT: '🇪🇬',
  ARGENTINA: '🇦🇷', 'CABO VERDE': '🇨🇻', COLOMBIA: '🇨🇴', GHANA: '🇬🇭'
};

const DISPLAY = {
  RSA: 'South Africa', CANADA: 'Canada', BRAZIL: 'Brazil', JAPAN: 'Japan', GERMANY: 'Germany', PARAGUAY: 'Paraguay',
  NETHERLANDS: 'Netherlands', MOROCCO: 'Morocco', CIV: 'Ivory Coast', NORWAY: 'Norway', FRANCE: 'France', SWEDEN: 'Sweden',
  MEXICO: 'Mexico', ECUADOR: 'Ecuador', ENGLAND: 'England', CONGO: 'Congo', BELGIUM: 'Belgium', SENEGAL: 'Senegal',
  USA: 'USA', 'BOSNIA-HERZEGOVINA': 'Bosnia-Herzegovina', SPAIN: 'Spain', AUSTRIA: 'Austria', PORTUGAL: 'Portugal',
  CROATIA: 'Croatia', SWITZERLAND: 'Switzerland', ALGERIA: 'Algeria', AUSTRALIA: 'Australia', EGYPT: 'Egypt',
  ARGENTINA: 'Argentina', 'CABO VERDE': 'Cabo Verde', COLOMBIA: 'Colombia', GHANA: 'Ghana'
};

const GAMES = [
  { id: 1, home: 'RSA', away: 'CANADA', date: 'Sunday, June 28', time: '15:00' },
  { id: 2, home: 'BRAZIL', away: 'JAPAN', date: 'Monday, June 29', time: '13:00' },
  { id: 3, home: 'GERMANY', away: 'PARAGUAY', date: 'Monday, June 29', time: '16:30' },
  { id: 4, home: 'NETHERLANDS', away: 'MOROCCO', date: 'Monday, June 29', time: '21:00' },
  { id: 5, home: 'CIV', away: 'NORWAY', date: 'Tuesday, June 30', time: '13:00' },
  { id: 6, home: 'FRANCE', away: 'SWEDEN', date: 'Tuesday, June 30', time: '17:00' },
  { id: 7, home: 'MEXICO', away: 'ECUADOR', date: 'Tuesday, June 30', time: '21:00' },
  { id: 8, home: 'ENGLAND', away: 'CONGO', date: 'Wednesday, July 1', time: '12:00' },
  { id: 9, home: 'BELGIUM', away: 'SENEGAL', date: 'Wednesday, July 1', time: '16:00' },
  { id: 10, home: 'USA', away: 'BOSNIA-HERZEGOVINA', date: 'Wednesday, July 1', time: '20:00' },
  { id: 11, home: 'SPAIN', away: 'AUSTRIA', date: 'Thursday, July 2', time: '15:00' },
  { id: 12, home: 'PORTUGAL', away: 'CROATIA', date: 'Thursday, July 2', time: '19:00' },
  { id: 13, home: 'SWITZERLAND', away: 'ALGERIA', date: 'Thursday, July 2', time: '23:00' },
  { id: 14, home: 'AUSTRALIA', away: 'EGYPT', date: 'Friday, July 3', time: '14:00' },
  { id: 15, home: 'ARGENTINA', away: 'CABO VERDE', date: 'Friday, July 3', time: '18:00' },
  { id: 16, home: 'COLOMBIA', away: 'GHANA', date: 'Friday, July 3', time: '21:30' }
];

const picks = {};

function teamButton(game, team) {
  return `
    <button type="button" class="team-btn" data-game="${game.id}" data-team="${team}" onclick="selectWinner(${game.id}, '${team.replace(/'/g, "\\'")}')">
      <span class="team-left"><span class="flag">${FLAGS[team] || '🏳️'}</span><span class="team-name">${DISPLAY[team] || team}</span></span>
      <span class="check" id="check_${game.id}_${team.replace(/[^A-Z0-9]/g, '')}"></span>
    </button>`;
}

function renderBracket() {
  const left = GAMES.slice(0, 8);
  const right = GAMES.slice(8);
  const bracket = document.getElementById('bracket');
  bracket.innerHTML = `
    <div>
      <h2 class="side-title">🏆 Bracket Side A</h2>
      <div class="side">${left.map(renderMatch).join('')}</div>
    </div>
    <div>
      <h2 class="side-title">🏆 Bracket Side B</h2>
      <div class="side">${right.map(renderMatch).join('')}</div>
    </div>`;
  updateProgress();
}

function renderMatch(game) {
  return `
    <article class="match" id="match_${game.id}">
      <div class="match-head">
        <div class="game-no">Game ${game.id}</div>
        <div class="time">⏰ ${game.date}<br>${game.time}</div>
      </div>
      <div class="teams">
        ${teamButton(game, game.home)}
        <div class="vs">VS</div>
        ${teamButton(game, game.away)}
      </div>
    </article>`;
}

function selectWinner(gameId, team) {
  picks[gameId] = team;
  document.querySelectorAll(`[data-game="${gameId}"]`).forEach(btn => {
    const isSelected = btn.dataset.team === team;
    btn.classList.toggle('selected', isSelected);
    const check = btn.querySelector('.check');
    if (check) check.textContent = isSelected ? '✓' : '';
  });
  updateProgress();
}

function updateProgress() {
  const total = GAMES.length;
  const selected = Object.keys(picks).length;
  document.getElementById('progressText').textContent = `Predicciones seleccionadas: ${selected} / ${total}`;
  document.getElementById('progressFill').style.width = `${(selected / total) * 100}%`;
}

function showMessage(text, type) {
  const msg = document.getElementById('msg');
  msg.className = `message ${type}`;
  msg.textContent = text;
}

function collectData() {
  const participant = document.getElementById('participant').value.trim();
  const participantEmail = document.getElementById('participantEmail').value.trim();
  const errors = [];
  const selectedPicks = [];

  if (!participant) errors.push('Falta el nombre del participante.');

  GAMES.forEach(game => {
    const winner = picks[game.id] || '';
    if (!winner) errors.push(`Falta escoger ganador del Game ${game.id}.`);
    selectedPicks.push({
      game: game.id,
      home: game.home,
      away: game.away,
      homeName: DISPLAY[game.home] || game.home,
      awayName: DISPLAY[game.away] || game.away,
      date: game.date,
      time: game.time,
      winner,
      winnerName: DISPLAY[winner] || winner
    });
  });

  return { round: 'Round of 32', participant, participantEmail, picks: selectedPicks, errors };
}

function summarize(data) {
  let text = `Participante: ${data.participant}\nEmail: ${data.participantEmail || ''}\nRonda: Round of 32\n\n`;
  data.picks.forEach(p => {
    text += `Game ${p.game}: ${p.homeName} vs ${p.awayName} | Ganador: ${p.winnerName}\n`;
  });
  return text;
}

function formatCSV(data) {
  const values = [new Date().toISOString(), data.participant, data.participantEmail];
  data.picks.forEach(p => values.push(p.winnerName || p.winner));
  return values.map(v => `"${String(v || '').replaceAll('"','""')}"`).join(',');
}

document.getElementById('predictionForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const submitBtn = document.getElementById('submitBtn');
  const data = collectData();

  if (data.errors.length) {
    showMessage(data.errors.join(' '), 'error');
    return;
  }

  document.getElementById('output').value = summarize(data);
  submitBtn.disabled = true;
  submitBtn.textContent = 'Enviando...';

  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(data)
    });
    showMessage('Predicción enviada. Gracias.', 'success');
    submitBtn.textContent = 'Enviado';
  } catch (err) {
    showMessage('No se pudo enviar automáticamente. Descarga el CSV de respaldo y avisa al administrador.', 'error');
    submitBtn.disabled = false;
    submitBtn.textContent = 'Enviar predicción';
  }
});

function downloadCSV() {
  const data = collectData();
  if (data.errors.length) { showMessage(data.errors.join(' '), 'error'); return; }
  const blob = new Blob([formatCSV(data)], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `round32_${data.participant.replace(/\s+/g,'_')}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  document.getElementById('output').value = summarize(data);
}

renderBracket();
</script>
</body>
</html>

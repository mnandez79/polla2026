<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>World Cup Pool 2026 | Quarterfinals</title>
<style>
:root{--bg:#f4f6f8;--card:#fff;--ink:#18202b;--muted:#6b7280;--line:#e5e7eb;--accent:#0f7b4f;--accent-light:#e7f5ee;--danger:#b42318;--shadow:0 12px 28px rgba(15,23,42,.08);--radius:22px}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;background:radial-gradient(circle at top,#fff 0%,var(--bg) 42%,#eef2f5 100%);color:var(--ink)}
.page{max-width:920px;margin:0 auto;padding:24px 16px 60px}
header{text-align:center;padding:28px 18px 22px;background:#0b1f17;color:white;border-radius:28px;box-shadow:var(--shadow);margin-bottom:18px}
.trophy{font-size:42px;margin-bottom:8px}
h1{margin:0;font-size:clamp(26px,5vw,44px);letter-spacing:-.04em;line-height:1}
.subtitle{margin:10px 0 0;color:rgba(255,255,255,.78);font-size:16px}
.admin-note{margin-top:12px;font-size:13px;color:rgba(255,255,255,.65)}
.panel{background:var(--card);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);border:1px solid rgba(229,231,235,.8);margin-bottom:16px}
.fields{display:grid;grid-template-columns:1fr 1fr;gap:12px}
label{display:block;font-weight:700;font-size:13px;color:#374151;margin-bottom:7px}
input{width:100%;height:48px;border:1px solid var(--line);border-radius:14px;padding:0 14px;font-size:16px;outline:none;background:#fbfcfd}
input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(15,123,79,.12);background:white}
.progress-wrap{position:sticky;top:0;z-index:10;margin:0 0 16px;padding-top:8px}
.progress-card{background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border:1px solid rgba(229,231,235,.9);border-radius:18px;padding:13px 14px;box-shadow:0 8px 20px rgba(15,23,42,.06)}
.progress-top{display:flex;justify-content:space-between;gap:12px;font-size:14px;font-weight:700;margin-bottom:8px}
.bar{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden}
.bar>div{height:100%;width:0%;background:linear-gradient(90deg,#0f7b4f,#2eb872);border-radius:999px;transition:width .25s ease}
.day-title{display:flex;align-items:center;gap:10px;margin:26px 4px 12px;color:#111827;font-weight:900;letter-spacing:-.02em;font-size:18px}
.day-title:before,.day-title:after{content:"";height:1px;background:var(--line);flex:1}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.match{background:var(--card);border-radius:var(--radius);padding:15px;box-shadow:var(--shadow);border:1px solid rgba(229,231,235,.85)}
.match-head{display:flex;justify-content:space-between;color:var(--muted);font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px}
.team{width:100%;border:1.5px solid var(--line);background:#fbfcfd;border-radius:16px;padding:13px 12px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:all .15s ease;text-align:left;font-size:16px;font-weight:800;color:var(--ink)}
.team:hover{border-color:#cbd5e1;transform:translateY(-1px)}
.team.selected{background:var(--accent-light);border-color:var(--accent);color:#064e3b;box-shadow:inset 0 0 0 1px rgba(15,123,79,.2)}
.flag{width:30px;height:22px;border-radius:4px;object-fit:cover;box-shadow:0 0 0 1px rgba(0,0,0,.08);flex:0 0 auto}
.vs{text-align:center;color:var(--muted);font-size:11px;font-weight:900;margin:7px 0;letter-spacing:.08em}
.scorebox{margin-top:12px;padding:12px;border-radius:16px;background:#f8fafc;border:1px solid var(--line)}
.score-title{font-size:12px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px}
.score-row{display:grid;grid-template-columns:1fr 76px;align-items:center;gap:10px;margin-bottom:8px;font-size:14px;font-weight:800;color:#374151}
.score-row:last-child{margin-bottom:0}
.score-row input{height:40px;text-align:center;font-weight:900;padding:0}
.time{margin-top:12px;color:var(--muted);font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px}
.actions{margin-top:20px;display:grid;gap:10px}
button.submit{width:100%;border:none;min-height:54px;border-radius:18px;background:var(--accent);color:white;font-size:17px;font-weight:900;cursor:pointer;box-shadow:0 12px 22px rgba(15,123,79,.22)}
button.submit:disabled{background:#9ca3af;cursor:not-allowed;box-shadow:none}
.message{display:none;padding:13px 14px;border-radius:14px;font-weight:800;font-size:14px}
.message.success{display:block;background:#e7f5ee;color:#0f5132}
.message.error{display:block;background:#fdecec;color:var(--danger)}
.summary{display:none;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--line);padding:18px;margin-top:16px}
.summary h2{margin:0 0 10px;font-size:20px}
.summary ul{margin:0;padding-left:20px;color:#374151}
@media(max-width:760px){.page{padding:12px 10px 40px}header{border-radius:22px;padding:24px 14px 20px}.fields{grid-template-columns:1fr}.grid{grid-template-columns:1fr;gap:12px}.match{padding:13px;border-radius:19px}.team{min-height:58px}}
</style>
</head>
<body>
<div class="page">
<header><div class="trophy">🏆</div><h1>World Cup Pool 2026</h1><p class="subtitle">Quarterfinals Predictions</p><div class="admin-note">Select the winner and enter the final score for each match. All 4 games are required.</div></header>
<section class="panel"><div class="fields"><div><label for="participant">Name</label><input id="participant" autocomplete="name" placeholder="Your name" /></div><div><label for="participantEmail">Email</label><input id="participantEmail" autocomplete="email" type="email" placeholder="you@email.com" /></div></div></section>
<div class="progress-wrap"><div class="progress-card"><div class="progress-top"><span>Progress</span><span id="progressText">0 / 4 games completed</span></div><div class="bar"><div id="progressBar"></div></div></div></div>
<main id="matches"></main>
<section class="summary" id="summary"><h2>Review your picks</h2><ul id="summaryList"></ul></section>
<section class="actions"><div id="message" class="message"></div><button id="submitBtn" class="submit" disabled>Finish remaining games</button></section>
</div>
<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzwQRejWXRhBy3-L6vFcKRlpDnSN2bKfNpmWx6uwXuQyRfX3QAkA9q2GinKqhbZO9BY/exec";
const flags={"FRANCE":"https://flagcdn.com/fr.svg","MOROCCO":"https://flagcdn.com/ma.svg","SPAIN":"https://flagcdn.com/es.svg","BELGIUM":"https://flagcdn.com/be.svg","NORWAY":"https://flagcdn.com/no.svg","ENGLAND":"https://flagcdn.com/gb-eng.svg","ARGENTINA":"https://flagcdn.com/ar.svg","SWITZERLAND":"https://flagcdn.com/ch.svg"};
const displayNames={"FRANCE":"France","MOROCCO":"Morocco","SPAIN":"Spain","BELGIUM":"Belgium","NORWAY":"Norway","ENGLAND":"England","ARGENTINA":"Argentina","SWITZERLAND":"Switzerland"};
const games=[
{id:1,day:"Thursday · July 9",time:"4:00 PM",team1:"FRANCE",team2:"MOROCCO"},
{id:2,day:"Friday · July 10",time:"3:00 PM",team1:"SPAIN",team2:"BELGIUM"},
{id:3,day:"Saturday · July 11",time:"5:00 PM",team1:"NORWAY",team2:"ENGLAND"},
{id:4,day:"Saturday · July 11",time:"9:00 PM",team1:"ARGENTINA",team2:"SWITZERLAND"}];
const picks={},scores={},TOTAL_GAMES=games.length;
const matchesEl=document.getElementById("matches"),progressText=document.getElementById("progressText"),progressBar=document.getElementById("progressBar"),submitBtn=document.getElementById("submitBtn"),messageEl=document.getElementById("message"),summaryEl=document.getElementById("summary"),summaryList=document.getElementById("summaryList");
function teamButton(game,teamCode){return `<button class="team" type="button" data-game="${game.id}" data-team="${teamCode}"><img class="flag" src="${flags[teamCode]}" alt="${displayNames[teamCode]} flag"><span>${displayNames[teamCode]}</span></button>`}
function renderGames(){let currentDay="",html="";games.forEach((game,index)=>{if(game.day!==currentDay){if(currentDay!=="")html+=`</section>`;currentDay=game.day;html+=`<div class="day-title">${game.day}</div><section class="grid">`}html+=`<article class="match"><div class="match-head"><span>Game ${game.id}</span><span>Quarterfinal</span></div>${teamButton(game,game.team1)}<div class="vs">VS</div>${teamButton(game,game.team2)}<div class="scorebox"><div class="score-title">Final score prediction</div><div class="score-row"><span>${displayNames[game.team1]}</span><input type="number" min="0" max="30" inputmode="numeric" data-score-game="${game.id}" data-score-team="team1" placeholder="0"></div><div class="score-row"><span>${displayNames[game.team2]}</span><input type="number" min="0" max="30" inputmode="numeric" data-score-game="${game.id}" data-score-team="team2" placeholder="0"></div></div><div class="time">🕒 ${game.day} · ${game.time} EDT</div></article>`;if(index===games.length-1)html+=`</section>`});matchesEl.innerHTML=html}
function isGameComplete(game){const s=scores[game.id]||{};return picks[game.id]&&s.team1!==undefined&&s.team1!==""&&s.team2!==undefined&&s.team2!==""}
function updateUI(){document.querySelectorAll(".team").forEach(btn=>{btn.classList.toggle("selected",picks[btn.dataset.game]===btn.dataset.team)});const completed=games.filter(isGameComplete).length;progressText.textContent=completed===TOTAL_GAMES?`${TOTAL_GAMES} / ${TOTAL_GAMES} completed ✓`:`${completed} / ${TOTAL_GAMES} games completed`;progressBar.style.width=`${completed/TOTAL_GAMES*100}%`;submitBtn.disabled=completed!==TOTAL_GAMES;submitBtn.textContent=completed===TOTAL_GAMES?"Submit Prediction":`Finish ${TOTAL_GAMES-completed} remaining game${TOTAL_GAMES-completed===1?"":"s"}`;if(completed===TOTAL_GAMES){summaryEl.style.display="block";summaryList.innerHTML=games.map(g=>{const s=scores[g.id];return `<li>Game ${g.id}: ${displayNames[picks[g.id]]} wins · ${displayNames[g.team1]} ${s.team1} - ${s.team2} ${displayNames[g.team2]}</li>`}).join("")}else{summaryEl.style.display="none"}}
function showMessage(text,type){messageEl.textContent=text;messageEl.className=`message ${type}`}
function collectData(){const participant=document.getElementById("participant").value.trim(),participantEmail=document.getElementById("participantEmail").value.trim(),errors=[];if(!participant)errors.push("Please enter your name.");if(!participantEmail)errors.push("Please enter your email.");if(games.filter(isGameComplete).length!==TOTAL_GAMES)errors.push("Please select a winner and score for all games.");const quarterfinals=games.map(g=>{const s=scores[g.id]||{};return{game:g.id,match:`${displayNames[g.team1]} vs ${displayNames[g.team2]}`,date:g.day,time:g.time,team1:displayNames[g.team1],team2:displayNames[g.team2],winner:displayNames[picks[g.id]||""],scoreTeam1:s.team1||"",scoreTeam2:s.team2||"",score:`${displayNames[g.team1]} ${s.team1||""} - ${s.team2||""} ${displayNames[g.team2]}`}});return{errors,round:"Quarterfinals",participant,participantEmail,quarterfinals}}
matchesEl.addEventListener("click",e=>{const btn=e.target.closest(".team");if(!btn)return;picks[btn.dataset.game]=btn.dataset.team;updateUI()});
matchesEl.addEventListener("input",e=>{const input=e.target.closest("[data-score-game]");if(!input)return;const gameId=input.dataset.scoreGame,team=input.dataset.scoreTeam;if(!scores[gameId])scores[gameId]={};scores[gameId][team]=input.value;updateUI()});
submitBtn.addEventListener("click",async()=>{const data=collectData();if(data.errors.length){showMessage(data.errors.join(" "),"error");return}if(!window.confirm("Submit your Quarterfinals prediction?"))return;submitBtn.disabled=true;submitBtn.textContent="Sending...";try{await fetch(SCRIPT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(data)});showMessage("Prediction sent. Thank you and good luck!","success");submitBtn.textContent="Submitted"}catch(err){showMessage("Could not send automatically. Please contact the administrator.","error");submitBtn.disabled=false;submitBtn.textContent="Submit Prediction"}});
renderGames();updateUI();
</script>
</body>
</html>
